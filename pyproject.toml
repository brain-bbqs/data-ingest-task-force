# Repository tooling configuration, shared across the per-lab codebases nested
# under labs/ (e.g. labs/kemere/). Each lab's runtime environment is declared
# separately under its own envs/pyproject.toml (see e.g. labs/kemere/containers/).

[tool.black]
line-length = 120

[tool.ruff]
line-length = 120
exclude = [
  "*/__init__.py",
  "labs/kemere/tests/example_raw",
  "labs/kemere/tests/expected_output",
]

[tool.ruff.lint]
select = ["F", "E", "I"]
fixable = ["ALL"]

[tool.ruff.lint.isort]
relative-imports-order = "closest-to-furthest"
