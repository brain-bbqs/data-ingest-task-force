name: Build and Upload Container

permissions:
  contents: read
  packages: read

# Manual only: this repo hosts multiple labs' codebases (labs/<lab>/), each
# with its own Dockerfile, so there's no single "the" image to auto-build on
# every push. Trigger explicitly from the desired branch/tag via the Actions
# UI (or `gh workflow run`), pointing at the Dockerfile to build. Every run
# always builds and publishes.
on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: "Path (from repo root) to the Dockerfile to build"
        required: true
        default: "labs/kemere/containers/kemere.Dockerfile"
      context:
        description: "Docker build context (from repo root)"
        required: true
        default: "labs/kemere"
      image:
        description: "Image name, published as ghcr.io/brain-bbqs/<image>"
        required: true
        default: "kemere-r34da059514-ingest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildAndPush:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/brain-bbqs/${{ inputs.image }}:latest
            ghcr.io/brain-bbqs/${{ inputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
